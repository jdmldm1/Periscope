replicaCount: 1

image:
  repository: ghcr.io/jdmldm1/periscope
  pullPolicy: Always

serviceAccount:
  create: true
  name: ""

service:
  type: NodePort
  port: 3001
  targetPort: 3001
  nodePort: 30080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

# Pod- and container-level security hardening. Defaults run Periscope as the
# unprivileged `node` user (uid 1000) baked into the image, with all Linux
# capabilities dropped and privilege escalation disabled.
#
# NOTE: the live network capture (Traffic Inspector / tcpdump) feature needs
# CAP_NET_RAW. If you use it, add the capability back:
#   containerSecurityContext:
#     capabilities:
#       drop: ["ALL"]
#       add: ["NET_RAW"]
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

auth:
  # Set an API key to require authentication for all API requests.
  # When empty, authentication is disabled (default for backward compatibility).
  apiKey: ""
