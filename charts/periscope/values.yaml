replicaCount: 1

image:
  repository: ghcr.io/jdmldm1/periscope-kubernetes
  pullPolicy: Always

serviceAccount:
  create: true
  name: ""

service:
  type: NodePort
  port: 3001
  targetPort: 3001
  nodePort: 30080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

auth:
  # Set an API key to require authentication for all API requests.
  # When empty, authentication is disabled (default for backward compatibility).
  apiKey: ""
