kind: ZarfPackageConfig

metadata:
  name: periscope-airgap
  description: A Periscope web console (airgap mode) for exploring and managing Kubernetes resources
  version: 1.3.1

variables:
  - name: AUTH_ENABLED
    description: "Enable username/password authentication"
    default: "true"
    prompt: true

components:
  - name: periscope
    required: true

    images:
      - ghcr.io/jdmldm1/periscope:1.3.1
      - alpine:latest

    charts:
      - name: periscope
        version: 0.3.1
        namespace: periscope
        localPath: ./charts/periscope
        valuesFiles:
          - ./charts/periscope/values.yaml
          - ./charts/periscope/values-airgap.yaml
        variables:
          - name: AUTH_ENABLED
            description: "Enable username/password authentication"
            path: auth.enabled
