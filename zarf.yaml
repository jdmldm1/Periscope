kind: ZarfPackageConfig

metadata:
  name: periscope
  description: A Periscope web console for exploring and managing Kubernetes resources
  version: 1.0.2

components:
  - name: periscope
    required: true

    images:
      - ghcr.io/jdmldm1/periscope-kubernetes:1.0.2-connected

    charts:
      - name: periscope
        version: 0.1.0
        namespace: periscope
        localPath: ./charts/periscope
        valuesFiles:
          - ./charts/periscope/values.yaml
