kind: ZarfPackageConfig

metadata:
  name: periscope
  description: A Periscope web console for exploring and managing Kubernetes resources
  version: 1.2.0

components:
  - name: periscope
    required: true

    images:
      - ghcr.io/jdmldm1/periscope:1.2.0-connected
      - alpine:latest

    charts:
      - name: periscope
        version: 0.2.0
        namespace: periscope
        localPath: ./charts/periscope
        valuesFiles:
          - ./charts/periscope/values.yaml
          - ./charts/periscope/values-connected.yaml
