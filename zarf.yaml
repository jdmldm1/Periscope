kind: ZarfPackageConfig

metadata:
  name: periscope
  description: A Periscope web console for exploring and managing Kubernetes resources
  version: 1.0.0

components:
  - name: periscope
    required: true

    images:
      - ghcr.io/###ZARF_VAR_IMAGE_REPO###:latest

    charts:
      - name: periscope
        version: 0.1.0
        namespace: periscope
        localPath: ./charts/periscope
        valuesFiles:
          - ./charts/periscope/values.yaml