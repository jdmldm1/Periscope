kind: ZarfPackageConfig

metadata:
  name: periscope
  description: A Periscope web console for exploring and managing Kubernetes resources
  version: 1.0.0

components:
  - name: periscope
    required: true

    # 🔥 CRITICAL: this is what Zarf actually imports into containerd
    images:
      - periscope:latest

    charts:
      - name: periscope
        version: 0.1.0
        namespace: periscope
        localPath: ./charts/periscope
        valuesFiles:
          - ./charts/periscope/values.yaml

    actions:
      onCreate:
        before:
          - cmd: docker build -t periscope:latest .
            description: Build Periscope image locally