name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/periscope
  ZARF_VERSION: v0.75.1
  APP_VERSION: 1.2.0


jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm test

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend unit tests
        run: |
          cd frontend
          npm run test

      - name: Build frontend to verify build sanity
        run: |
          cd frontend
          npm run build

  build-and-push-oci:
    needs: test-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase Repository and Owner Names
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Airgap Docker image to OCI
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: CACHE_GRYPE_DB=true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ env.APP_VERSION }}
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ github.sha }}

      - name: Build and push Connected Docker image to OCI
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: CACHE_GRYPE_DB=false
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:latest-connected
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ env.APP_VERSION }}-connected
            ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ github.sha }}-connected

  helm-package-oci:
    needs: build-and-push-oci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase Repository and Owner Names
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Helm CLI
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Helm OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Lint Helm Chart
        run: helm lint charts/periscope

      - name: Package Helm Chart
        run: helm package charts/periscope --destination dist/

      - name: Push Helm Chart to OCI Registry
        run: |
          helm push dist/periscope-*.tgz oci://${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/charts

  zarf-package-oci:
    needs: build-and-push-oci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase Repository and Owner Names
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Zarf CLI
        run: |
          curl -sL "https://github.com/zarf-dev/zarf/releases/download/${{ env.ZARF_VERSION }}/zarf_${{ env.ZARF_VERSION }}_Linux_amd64" -o /usr/local/bin/zarf
          chmod +x /usr/local/bin/zarf
          zarf version

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker images to local daemon
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ env.APP_VERSION }}-connected
          docker pull ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}:${{ env.APP_VERSION }}

      - name: Log in to GHCR for Zarf OCI
        run: |
          zarf tools registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}

      - name: Install ORAS CLI
        run: |
          curl -LO https://github.com/oras-project/oras/releases/download/v1.2.0/oras_1.2.0_linux_amd64.tar.gz
          tar -zxf oras_1.2.0_linux_amd64.tar.gz -C /usr/local/bin/ oras
          rm oras_1.2.0_linux_amd64.tar.gz
          oras version

      - name: Install Grype CLI
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype version

      - name: Create Zarf Packages and Export SBOMs
        run: |
          mkdir -p sbom-output
          # Use sed to replace the default repository with the lowercase repo name
          # Zarf's image parser is strict and doesn't like template syntax in the images list
          sed -i "s|jdmldm1/periscope|${{ env.REPO_LOWER }}|g" zarf.yaml
          sed -i "s|jdmldm1/periscope|${{ env.REPO_LOWER }}|g" zarf-airgap.yaml
          
          # 1. Build Connected Zarf Package (Default)
          zarf package create --confirm --sbom-out ./sbom-output
          
          # 2. Build Airgap Zarf Package
          mv zarf.yaml zarf-connected.tmp
          mv zarf-airgap.yaml zarf.yaml
          zarf package create --confirm --sbom-out ./sbom-output
          
          # Restore files
          mv zarf.yaml zarf-airgap.yaml
          mv zarf-connected.tmp zarf.yaml
          
          echo "Contents of sbom-output:"
          ls -R sbom-output

      - name: Scan SBOMs with Grype
        run: |
          SBOM_FILE=$(find ./sbom-output -name "*syft.json" -type f | head -n 1)
          if [ -z "$SBOM_FILE" ]; then
            echo "Warning: No Syft SBOM json file found with syft.json suffix, trying any json..."
            SBOM_FILE=$(find ./sbom-output -name "*.json" -type f | head -n 1)
          fi
          
          if [ -z "$SBOM_FILE" ]; then
            echo "Error: No SBOM json file found in sbom-output!"
            exit 1
          fi
          
          echo "Found SBOM: $SBOM_FILE"
          grype sbom:"$SBOM_FILE" --output json > vulnerability-report.json
          echo "Vulnerability scan completed. Saved to vulnerability-report.json"

      - name: Log in to GHCR with ORAS
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Publish SBOM and Vulnerabilities to GHCR via ORAS
        run: |
          SBOM_FILE=$(find ./sbom-output -name "*.json" -type f | head -n 1)
          if [ -z "$SBOM_FILE" ]; then
            echo "Error: No SBOM file to push!"
            exit 1
          fi
          oras push ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/packages/periscope-sbom:${{ env.APP_VERSION }} \
            $SBOM_FILE:application/vnd.syft+json \
            vulnerability-report.json:application/json

      - name: Publish Zarf Packages to OCI Registry
        run: |
          for pkg in zarf-package-periscope-*.tar.zst; do
            echo "Publishing package: $pkg"
            zarf package publish "$pkg" oci://${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/packages
          done
